- name: create ec2-instance
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-0cc1cfc505eb56913
    instances:
    - mysql
    - redis
    - mongodb
    - rabbitmq
    - catalogue
    - user
    - cart
    - shipping
    - payment
    - frontend

  tasks:
  - name: create ec2-instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"  
