- name: create ec2-instance
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-0cc1cfc505eb56913
    zone_id: Z080016735ABBDKC0FSCB
    domain_name: "vicky.08.fun"
    instances:
    # - mysql
    # - redis
    # - mongodb
    # - rabbitmq
    # - catalogue
    # - user
    # - cart
    # - shipping
    # - payment
    # - frontend

  tasks:
  - name: create ec2-instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"  
    register: ec2_output


- name: create route53 record
  amazon.route53:
    state: present
    zone: "{{ domain_name }}"
    record: "{{ item.item }}.{{ domain_name }}"
    type: A 
    ttl: 1
    value: "{{ item.instances[0].private_ip_address }}"
    overwrite: true
  loop: "{{ ec2_ouput.results }}"


- name: create route53 record
  amazon.aws.route53:
    state: present
    zone: "{{ domain_name }}"
    record: "{{ domain_name }}"
    type: A 
    ttl: 1
    value: "{{ item.instances[0].public_ip_address }}"
    overwrite: true
  when: item.item == "frontend"
  loop: "{{ ec2_ouput.results }}"


